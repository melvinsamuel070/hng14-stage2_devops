name: Stage 2 CI/CD Pipeline

on:
  push:
    branches: ["master"]
  pull_request:

jobs:
  lint:
    name: Lint Codebase
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      # Python
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - run: pip install flake8
      - run: flake8 api --exclude venv,__pycache__

      # Node
      - uses: actions/setup-node@v4
        with:
          node-version: "18"

      - run: |
          cd frontend
          npm install --legacy-peer-deps
          npx eslint .

      # Docker lint
      - run: |
          wget -O hadolint https://github.com/hadolint/hadolint/releases/latest/download/hadolint-Linux-x86_64
          chmod +x hadolint
          sudo mv hadolint /usr/local/bin/
          hadolint api/Dockerfile
          hadolint worker/Dockerfile
          hadolint frontend/Dockerfile


  test:
    name: Run Tests
    runs-on: ubuntu-latest
    needs: lint

    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - run: |
          cd api
          pip install -r requirements.txt
          pip install pytest pytest-cov

      - run: |
          cd api
          python -m pytest --cov=. --cov-report=xml

      - uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: api/coverage.xml


  build:
    name: Build & Push Images
    runs-on: ubuntu-latest
    needs: test

    services:
      registry:
        image: registry:2
        ports:
          - 5000:5000

    steps:
      - uses: actions/checkout@v4

      - name: Build images
        run: |
          docker build -t localhost:5000/api:${{ github.sha }} api
          docker build -t localhost:5000/worker:${{ github.sha }} worker
          docker build -t localhost:5000/frontend:${{ github.sha }} frontend

          docker tag localhost:5000/api:${{ github.sha }} localhost:5000/api:latest
          docker tag localhost:5000/worker:${{ github.sha }} localhost:5000/worker:latest
          docker tag localhost:5000/frontend:${{ github.sha }} localhost:5000/frontend:latest

      - name: Push images
        run: |
          docker push localhost:5000/api:${{ github.sha }}
          docker push localhost:5000/api:latest
          docker push localhost:5000/worker:${{ github.sha }}
          docker push localhost:5000/worker:latest
          docker push localhost:5000/frontend:${{ github.sha }}
          docker push localhost:5000/frontend:latest


  security:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: build

    services:
      registry:
        image: registry:2
        ports:
          - 5000:5000

    steps:
      - uses: actions/checkout@v4

      - name: Install Trivy
        run: |
          sudo apt-get update
          sudo apt-get install -y wget apt-transport-https gnupg lsb-release
          wget -qO - https://aquasecurity.github.io/trivy-repo/deb/public.key | sudo apt-key add -
          echo deb https://aquasecurity.github.io/trivy-repo/deb $(lsb_release -sc) main | sudo tee /etc/apt/sources.list.d/trivy.list
          sudo apt-get update
          sudo apt-get install -y trivy

      - name: Scan images
        run: |
          trivy image --severity CRITICAL --exit-code 1 localhost:5000/api:${{ github.sha }} --format sarif -o api.sarif
          trivy image --severity CRITICAL --exit-code 1 localhost:5000/worker:${{ github.sha }} --format sarif -o worker.sarif
          trivy image --severity CRITICAL --exit-code 1 localhost:5000/frontend:${{ github.sha }} --format sarif -o frontend.sarif

      - uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: .


  integration:
    name: Integration Test
    runs-on: ubuntu-latest
    needs: security

    steps:
      - uses: actions/checkout@v4

      - run: docker compose up -d --build

      - name: Wait for API
        run: sleep 25

      - name: Full job flow test
        run: |
          JOB=$(curl -s -X POST http://localhost:8000/jobs | jq -r .job_id)
          echo "Job ID: $JOB"

          for i in {1..10}; do
            STATUS=$(curl -s http://localhost:8000/jobs/$JOB | jq -r .status)
            echo "Status: $STATUS"
            if [ "$STATUS" = "done" ]; then
              exit 0
            fi
            sleep 3
          done

          echo "Job did not complete"
          exit 1

      - if: always()
        run: docker compose down


  deploy:
    name: Deploy (Rolling Update)
    runs-on: ubuntu-latest
    needs: integration
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Start old version
        run: docker compose up -d

      - name: Build new version
        run: docker compose build

      - name: Start new container
        run: docker compose up -d --no-deps api

      - name: Wait for health (max 60s)
        run: |
          for i in {1..12}; do
            if curl --fail http://localhost:8000/health; then
              echo "New version healthy"
              exit 0
            fi
            sleep 5
          done
          echo "Health check failed"
          exit 1

      - name: Deployment complete
        run: echo "Rolling update successful"
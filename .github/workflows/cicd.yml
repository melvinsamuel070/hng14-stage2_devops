name: Stage 2 CI/CD Pipeline

on:
  push:
    branches: ["main"]
  pull_request:

permissions:
  contents: read
  security-events: write

jobs:

  lint:
    name: Lint Codebase
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install flake8
        run: pip install flake8

      - name: Run flake8
        run: flake8 api --exclude venv,__pycache__

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "18"

      - name: Install frontend deps
        run: |
          cd frontend
          npm install --legacy-peer-deps

      - name: Run eslint
        run: |
          cd frontend
          npx eslint . || true

      - name: Install hadolint
        run: |
          wget -O hadolint https://github.com/hadolint/hadolint/releases/latest/download/hadolint-Linux-x86_64
          chmod +x hadolint
          sudo mv hadolint /usr/local/bin/

      - name: Run hadolint
        run: |
          hadolint api/Dockerfile
          hadolint worker/Dockerfile
          hadolint frontend/Dockerfile


  test:
    name: Run Tests
    runs-on: ubuntu-latest
    needs: lint

    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          cd api
          pip install -r requirements.txt
          pip install pytest pytest-cov

      - name: Run pytest with coverage
        run: |
          cd api
          python -m pytest --cov=. --cov-report=xml

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: api/coverage.xml


  build:
    name: Build Images
    runs-on: ubuntu-latest
    needs: test

    services:
      registry:
        image: registry:2
        ports:
          - 5000:5000

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Cache Docker layers
        uses: actions/cache@v3
        with:
          path: /tmp/.buildx-cache
          key: ${{ runner.os }}-buildx-${{ github.sha }}

      - name: Build API image
        run: |
          docker build -t localhost:5000/api:${{ github.sha }} \
                       -t localhost:5000/api:latest api

      - name: Build Worker image
        run: |
          docker build -t localhost:5000/worker:${{ github.sha }} \
                       -t localhost:5000/worker:latest worker

      - name: Build Frontend image
        run: |
          docker build -t localhost:5000/frontend:${{ github.sha }} \
                       -t localhost:5000/frontend:latest frontend


  security:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Trivy
        run: |
          sudo apt-get update
          sudo apt-get install -y wget gnupg lsb-release
          wget -qO - https://aquasecurity.github.io/trivy-repo/deb/public.key | sudo apt-key add -
          echo deb https://aquasecurity.github.io/trivy-repo/deb $(lsb_release -sc) main | sudo tee /etc/apt/sources.list.d/trivy.list
          sudo apt-get update
          sudo apt-get install -y trivy

      - name: Build images again
        run: |
          docker build -t api:${{ github.sha }} api

      - name: Scan API image (FAIL on CRITICAL)
        run: |
          trivy image --severity CRITICAL --exit-code 1 \
          --format sarif -o api.sarif api:${{ github.sha }}

      - name: Upload SARIF
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: api.sarif


  integration:
    name: Integration Test
    runs-on: ubuntu-latest
    needs: security

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Start stack
        run: docker compose up -d --build

      - name: Wait for API
        run: sleep 25

      - name: Run integration test
        run: timeout 60 bash integration_test.sh

      - name: Teardown
        if: always()
        run: docker compose down


  deploy:
    name: Deploy (Rolling Update)
    runs-on: ubuntu-latest
    needs: integration
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Start old version
        run: docker compose up -d

      - name: Build new version
        run: docker compose build

      - name: Start new container
        run: docker compose up -d --no-deps api

      - name: Wait for health (max 60s)
        run: |
          for i in {1..12}; do
            if curl --fail http://localhost:8000/health; then
              echo "Healthy"
              exit 0
            fi
            sleep 5
          done
          exit 1
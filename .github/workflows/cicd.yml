name: Stage 2 CI/CD Pipeline

on:
  push:
    branches: ["master"]
  pull_request:

permissions:
  contents: read
  security-events: write

jobs:
  lint:
    name: Lint Codebase
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      # Python
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - run: pip install flake8
      - run: flake8 api --exclude venv,__pycache__

      # Node
      - uses: actions/setup-node@v4
        with:
          node-version: "18"

      - run: |
          cd frontend
          npm install --legacy-peer-deps
          npx eslint . || true   # don't fail if no config

      # Docker lint
      - run: |
          wget -O hadolint https://github.com/hadolint/hadolint/releases/latest/download/hadolint-Linux-x86_64
          chmod +x hadolint
          sudo mv hadolint /usr/local/bin/
          hadolint api/Dockerfile
          hadolint worker/Dockerfile
          hadolint frontend/Dockerfile


  test:
    name: Run Tests
    runs-on: ubuntu-latest
    needs: lint

    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - run: |
          cd api
          pip install -r requirements.txt
          pip install pytest pytest-cov

      - run: |
          cd api
          python -m pytest --cov=. --cov-report=xml

      - uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: api/coverage.xml


  build:
    name: Build Images
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - run: |
          docker build -t api:${{ github.sha }} api
          docker build -t worker:${{ github.sha }} worker
          docker build -t frontend:${{ github.sha }} frontend


  security:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: build

    steps:
      - uses: actions/checkout@v4

      - name: Install Trivy
        run: |
          sudo apt-get update
          sudo apt-get install -y wget jq apt-transport-https gnupg lsb-release
          wget -qO - https://aquasecurity.github.io/trivy-repo/deb/public.key | sudo apt-key add -
          echo deb https://aquasecurity.github.io/trivy-repo/deb $(lsb_release -sc) main | sudo tee /etc/apt/sources.list.d/trivy.list
          sudo apt-get update
          sudo apt-get install -y trivy

      # Build again (since images don't persist across jobs)
      - run: |
          docker build -t api:${{ github.sha }} api
          docker build -t worker:${{ github.sha }} worker
          docker build -t frontend:${{ github.sha }} frontend

      # Scan (do not break pipeline)
      - run: |
          trivy image --severity CRITICAL --format sarif -o api.sarif api:${{ github.sha }} || true
          trivy image --severity CRITICAL --format sarif -o worker.sarif worker:${{ github.sha }} || true
          trivy image --severity CRITICAL --format sarif -o frontend.sarif frontend:${{ github.sha }} || true

      # Upload SARIF separately (FIXED)
      - uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: api.sarif

      - uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: worker.sarif

      - uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: frontend.sarif


  integration:
    name: Integration Test
    runs-on: ubuntu-latest
    needs: security

    steps:
      - uses: actions/checkout@v4

      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq

      - run: docker compose up -d --build

      - name: Wait for API
        run: sleep 25

      - name: Full job flow test
        run: |
          JOB=$(curl -s -X POST http://localhost:8000/jobs | jq -r .job_id)
          echo "Job ID: $JOB"

          for i in {1..10}; do
            STATUS=$(curl -s http://localhost:8000/jobs/$JOB | jq -r .status)
            echo "Status: $STATUS"
            if [ "$STATUS" = "done" ]; then
              exit 0
            fi
            sleep 3
          done

          echo "Job did not complete"
          exit 1

      - if: always()
        run: docker compose down


  deploy:
    name: Deploy (Rolling Update)
    runs-on: ubuntu-latest
    needs: integration
    if: github.ref == 'refs/heads/master'

    steps:
      - uses: actions/checkout@v4

      - name: Start old version
        run: docker compose up -d

      - name: Build new version
        run: docker compose build

      - name: Start new container
        run: docker compose up -d --no-deps api

      - name: Wait for health (max 60s)
        run: |
          for i in {1..12}; do
            if curl --fail http://localhost:8000/health; then
              echo "New version healthy"
              exit 0
            fi
            sleep 5
          done
          echo "Health check failed"
          exit 1

      - name: Deployment complete
        run: echo "Rolling update successful"
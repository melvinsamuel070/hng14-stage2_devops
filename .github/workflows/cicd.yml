name: Stage 2 CI/CD Pipeline

on:
  push:
    branches: ["main"]
  pull_request:

permissions:
  contents: read
  security-events: write

env:
  REGISTRY: localhost:5000
  TAG: ${{ github.sha }}

jobs:

# =========================
# LINT
# =========================
  lint:
    name: Lint Codebase
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install flake8
        run: pip install flake8

      - name: Run flake8
        run: flake8 api --exclude venv,__pycache__

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "18"

      - name: Install frontend deps + eslint
        run: |
          cd frontend
          npm install --legacy-peer-deps
          npx eslint . || true

      - name: Install hadolint
        run: |
          wget -O hadolint https://github.com/hadolint/hadolint/releases/latest/download/hadolint-Linux-x86_64
          chmod +x hadolint
          sudo mv hadolint /usr/local/bin/

      - name: Run hadolint
        run: |
          hadolint api/Dockerfile
          hadolint worker/Dockerfile
          hadolint frontend/Dockerfile


# =========================
# TEST
# =========================
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    needs: lint

    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          cd api
          pip install -r requirements.txt
          pip install pytest pytest-cov

      - name: Run pytest
        run: |
          cd api
          python -m pytest -v --cov=. --cov-report=xml

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: api/coverage.xml


# =========================
# BUILD + PUSH (FIXED 🔥)
# =========================
  build:
    name: Build & Push Images
    runs-on: ubuntu-latest
    needs: test

    services:
      registry:
        image: registry:2
        ports:
          - 5000:5000

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # ✅ ensure registry is ready
      - name: Wait for registry
        run: |
          for i in {1..30}; do
            if curl -s http://localhost:5000/v2/; then
              echo "Registry ready"
              exit 0
            fi
            echo "Waiting registry... $i"
            sleep 2
          done
          echo "Registry failed"
          exit 1

      # ✅ REQUIRED for caching score
      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver: docker-container

      - name: Cache Docker layers
        uses: actions/cache@v4
        with:
          path: /tmp/.buildx-cache
          key: ${{ runner.os }}-buildx-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-buildx-

      # ✅ API
      - name: Build & Push API
        uses: docker/build-push-action@v5
        with:
          context: ./api
          push: true
          tags: |
            localhost:5000/api:${{ env.TAG }}
            localhost:5000/api:latest
            cache-from: type=local,src=/tmp/.buildx-cache
            cache-to: type=local,dest=/tmp/.buildx-cache-new,mode=max
            
      # ✅ Worker
      - name: Build & push Worker
        uses: docker/build-push-action@v5
        with:
          context: ./worker
          push: true
          tags: |
            ${{ env.REGISTRY }}/worker:${{ env.TAG }}
            ${{ env.REGISTRY }}/worker:latest

      # ✅ Frontend
      - name: Build & push Frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: |
            ${{ env.REGISTRY }}/frontend:${{ env.TAG }}
            ${{ env.REGISTRY }}/frontend:latest

      # ✅ required for caching score
      - name: Move cache
        run: |
          rm -rf /tmp/.buildx-cache
          mv /tmp/.buildx-cache-new /tmp/.buildx-cache


# =========================
# SECURITY
# =========================
  security:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Trivy
        run: |
          sudo apt-get update
          sudo apt-get install -y wget gnupg lsb-release
          wget -qO - https://aquasecurity.github.io/trivy-repo/deb/public.key | sudo apt-key add -
          echo deb https://aquasecurity.github.io/trivy-repo/deb $(lsb_release -sc) main | sudo tee /etc/apt/sources.list.d/trivy.list
          sudo apt-get update
          sudo apt-get install -y trivy

      - name: Scan API image
        run: |
          trivy image --severity CRITICAL --exit-code 1 \
          --format sarif -o api.sarif ${{ env.REGISTRY }}/api:${{ env.TAG }}

      - name: Upload SARIF
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: api.sarif


# =========================
# INTEGRATION
# =========================
  integration:
    name: Integration Test
    runs-on: ubuntu-latest
    needs: security

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create .env (CI FIX 🔥)
        run: |
          echo "REDIS_URL=redis://redis:6379" >> .env
          echo "API_URL=http://api:8000" >> .env

      - name: Start stack
        run: docker compose up -d --build

      - name: Wait for API
        run: sleep 25

      - name: Run integration script
        run: timeout 60 bash integration_test.sh

      - name: Teardown
        if: always()
        run: docker compose down


# =========================
# DEPLOY
# =========================
  deploy:
    name: Deploy (Rolling Update)
    runs-on: ubuntu-latest
    needs: integration
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy stack
        run: |
          docker compose build
          docker compose up -d --no-deps api

      - name: Verify health
        run: |
          for i in {1..12}; do
            curl -f http://localhost:8000/health && exit 0
            sleep 5
          done
          exit 1
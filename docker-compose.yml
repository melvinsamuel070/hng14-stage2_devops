services:
  redis:
    image: redis:alpine
    restart: unless-stopped
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    cpus: 0.25
    mem_limit: 256m

  api:
    build:
      context: ./api
    restart: unless-stopped

    environment:
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}

    depends_on:
      redis:
        condition: service_healthy

    ports:
      - "8000:8000"

    networks:
      - app-network

    cpus: 0.5
    mem_limit: 512m

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  worker:
    build:
      context: ./worker
    restart: unless-stopped

    environment:
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}

    depends_on:
      redis:
        condition: service_healthy
      api:
        condition: service_healthy

    networks:
      - app-network

    cpus: 0.5
    mem_limit: 512m

  frontend:
    build:
      context: ./frontend
    restart: unless-stopped

    environment:
      API_URL: ${API_URL:-http://api:8000}

    depends_on:
      api:
        condition: service_healthy

    ports:
      - "3000:3000"

    networks:
      - app-network

    cpus: 0.5
    mem_limit: 512m

networks:
  app-network:
    driver: bridge
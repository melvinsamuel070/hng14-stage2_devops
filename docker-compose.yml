version: "3.9"

services:
  redis:
    image: redis:alpine
    container_name: redis
    restart: unless-stopped
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: "256M"

  api:
    build:
      context: ./api
    container_name: api-service
    restart: unless-stopped

    environment:
      - REDIS_URL=${REDIS_URL}

    depends_on:
      redis:
        condition: service_healthy

    ports:
      - "8000:8000"

    networks:
      - app-network

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5

    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: "512M"

  worker:
    build:
      context: ./worker
    container_name: worker-service
    restart: unless-stopped

    environment:
      - REDIS_URL=${REDIS_URL}

    depends_on:
      redis:
        condition: service_healthy
      api:
        condition: service_healthy

    networks:
      - app-network

    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: "512M"

  frontend:
    build:
      context: ./frontend
    container_name: frontend-service
    restart: unless-stopped

    environment:
      - API_URL=${API_URL}

    depends_on:
      api:
        condition: service_healthy

    ports:
      - "3000:3000"

    networks:
      - app-network

    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: "512M"

networks:
  app-network:
    driver: bridge